<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>💸 PagsDark — Entrar</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💸</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    body { overflow: auto; }
    .login-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .login-card { width: 100%; max-width: 400px; }
    .login-card .brand { justify-content: center; padding-bottom: 8px; }
    .login-card h2 { text-align: center; margin: 6px 0 2px; font-size: 22px; font-weight: 800; }
    .login-card .sub { text-align: center; color: var(--muted); margin: 0 0 22px; font-size: 14px; }
    .gbtn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; border-radius: 11px; border: 1px solid var(--line); background: #fff; color: #222; font-weight: 700; cursor: pointer; font-size: 15px; }
    .gbtn:hover { filter: brightness(.96); }
    .sep { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 12px; margin: 18px 0; }
    .sep::before, .sep::after { content: ""; height: 1px; background: var(--line); flex: 1; }
    .msg { font-size: 13px; margin-top: 12px; text-align: center; min-height: 18px; }
    .msg.err { color: var(--err); } .msg.ok { color: var(--ok); }
    .login-foot { text-align: center; color: var(--muted); font-size: 12px; margin-top: 18px; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="card login-card">
      <div class="brand"><span class="emoji" style="font-size:34px">💸</span>
        <div><div class="name" style="font-size:24px">Pags<b>Dark</b></div></div></div>
      <h2>Entrar</h2>
      <p class="sub">Acesse sua conta para editar e agendar.</p>

      <button class="gbtn" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.7-6.7C35.6 2.6 30.2 0 24 0 14.6 0 6.5 5.4 2.6 13.2l7.8 6.1C12.3 13.2 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.6c0-1.6-.1-2.8-.4-4H24v7.6h12.7c-.3 2.1-1.6 5.2-4.7 7.3l7.2 5.6c4.3-4 6.9-9.9 6.9-16.5z"/><path fill="#FBBC05" d="M10.4 28.3c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-7.8-6.1C1 16.1 0 19.9 0 23.7s1 7.6 2.6 10.7l7.8-6.1z"/><path fill="#34A853" d="M24 47.4c6.2 0 11.4-2 15.2-5.5l-7.2-5.6c-2 1.4-4.6 2.3-8 2.3-6.4 0-11.7-3.7-13.6-8.9l-7.8 6.1C6.5 42 14.6 47.4 24 47.4z"/></svg>
        Entrar com Google
      </button>

      <div class="sep">ou com e-mail</div>

      <form id="emailForm">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="voce@email.com" required />
        <label>Senha</label>
        <input type="password" id="password" placeholder="••••••••" required minlength="6" />
        <div class="row" style="margin-top:14px; gap:10px">
          <button class="btn" type="submit" style="flex:1">Entrar</button>
          <button class="btn ghost" type="button" id="signupBtn" style="flex:1">Criar conta</button>
        </div>
      </form>

      <div class="msg" id="msg"></div>
      <div class="login-foot" id="foot"></div>
    </div>
  </div>
  <script type="module" src="/login.js"></script>
</body>
</html>
